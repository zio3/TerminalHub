name: Build and Release

on:
  push:
    tags:
      - 'v*'  # v1.0.0 などのタグがプッシュされたときに実行
  workflow_dispatch:  # 手動実行用（先行テスト版ビルド: GitHub Release は作らず Artifact のみ保存）
    inputs:
      build_installer:
        description: 'Inno Setup インストーラー .exe も生成する'
        type: boolean
        default: true

permissions:
  contents: write  # リリース作成に必要

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0  # マージコミットからPR番号を辿るため履歴を全取得

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Get version from tag
        id: get_version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            # workflow_dispatch 時は csproj の現行バージョンを読み取って使用
            # （ビルドコミットは Actions の実行ページから辿れるため、suffix は付けない）
            BASE=$(grep -oP '(?<=<Version>)[^<]+' TerminalHub/TerminalHub.csproj | head -1)
            echo "VERSION=${BASE}" >> $GITHUB_OUTPUT
          fi

      - name: Compute preview build metadata
        id: build_meta
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        shell: bash
        run: |
          # 直近の「Merge pull request #NN」からPR番号を抽出（無ければ空）
          PR=$(git log --grep='Merge pull request #' -1 --pretty=%s | grep -oP '#\K[0-9]+' || true)
          SHA=$(git rev-parse --short HEAD)
          DATE=$(date -u +%Y-%m-%d)
          echo "PR=${PR}" >> $GITHUB_OUTPUT
          echo "SHA=${SHA}" >> $GITHUB_OUTPUT
          echo "DATE=${DATE}" >> $GITHUB_OUTPUT
          echo "プレビュー版メタデータ: PR=#${PR:-?} SHA=${SHA} DATE=${DATE}"

      - name: Update version in installer script
        if: startsWith(github.ref, 'refs/tags/v') || inputs.build_installer == true
        shell: pwsh
        run: |
          $version = "${{ steps.get_version.outputs.VERSION }}"
          $issPath = "installer/TerminalHub.iss"
          $content = Get-Content $issPath -Raw
          $content = $content -replace '#define MyAppVersion ".*"', "#define MyAppVersion `"$version`""
          Set-Content $issPath $content -NoNewline

      - name: Inject MQTT credentials
        shell: pwsh
        run: |
          $settingsPath = "TerminalHub/appsettings.json"
          $json = Get-Content $settingsPath -Raw | ConvertFrom-Json
          $json.Mqtt.Username = "${{ secrets.MQTT_USERNAME }}"
          $json.Mqtt.Password = "${{ secrets.MQTT_PASSWORD }}"
          $json | ConvertTo-Json -Depth 10 | Set-Content $settingsPath -NoNewline

      - name: Inject Discord error-report webhook URL
        shell: pwsh
        run: |
          $settingsPath = "TerminalHub/appsettings.json"
          $json = Get-Content $settingsPath -Raw | ConvertFrom-Json
          $json.ErrorReport.WebhookUrl = "${{ secrets.DISCORD_ERROR_WEBHOOK_URL }}"
          $json | ConvertTo-Json -Depth 10 | Set-Content $settingsPath -NoNewline

      - name: Publish application
        shell: pwsh
        run: |
          # vタグ = 正式リリース版（channel=release）/ それ以外 = プレビュー版（channel=preview）
          # ※ Git Bash だと MSYS のパス変換で "/p:" の先頭スラッシュが剥がれて MSBuild が失敗するため pwsh を使う
          $channel = if ($env:GITHUB_REF -like 'refs/tags/v*') { 'release' } else { 'preview' }
          dotnet publish TerminalHub/TerminalHub.csproj -c Release -r win-x64 --self-contained true -o ./publish `
            /p:Version=${{ steps.get_version.outputs.VERSION }} `
            /p:BuildChannel=$channel `
            /p:BuildPr=${{ steps.build_meta.outputs.PR }} `
            /p:BuildCommit=${{ steps.build_meta.outputs.SHA }} `
            /p:BuildDate=${{ steps.build_meta.outputs.DATE }}

      - name: Install Inno Setup
        if: startsWith(github.ref, 'refs/tags/v') || inputs.build_installer == true
        shell: pwsh
        run: |
          # Inno Setupをダウンロード
          $url = "https://jrsoftware.org/download.php/is.exe"
          $output = "$env:TEMP\innosetup.exe"
          Invoke-WebRequest -Uri $url -OutFile $output

          # サイレントインストール
          Start-Process -FilePath $output -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART /SP-" -Wait

      - name: Build installer
        if: startsWith(github.ref, 'refs/tags/v') || inputs.build_installer == true
        shell: pwsh
        run: |
          # 出力ディレクトリを作成
          New-Item -ItemType Directory -Path "installer/output" -Force | Out-Null

          # Inno Setupでビルド
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "installer/TerminalHub.iss"

      - name: Upload build artifact (publish output)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v6
        with:
          name: TerminalHub-dev-build
          path: ./publish/

      - name: Upload installer artifact (workflow_dispatch のみ)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') && inputs.build_installer == true }}
        uses: actions/upload-artifact@v6
        with:
          name: TerminalHub-installer-preview
          path: installer/output/*.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: installer/output/*.exe
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
